<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" role="img" aria-label="MR.C Digital Studio — Gilded Circuit Logo">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@800;900&amp;display=swap');</style>

    <linearGradient id="g1-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7A5C2E"/>
      <stop offset="18%"  stop-color="#C4A47C"/>
      <stop offset="38%"  stop-color="#F3E5AB"/>
      <stop offset="55%"  stop-color="#D4AF37"/>
      <stop offset="72%"  stop-color="#F3E5AB"/>
      <stop offset="88%"  stop-color="#C4A47C"/>
      <stop offset="100%" stop-color="#7A5C2E"/>
    </linearGradient>

    <linearGradient id="g1-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#D4AF37" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#D4AF37" stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#F3E5AB" stop-opacity="0.9"/>
      <stop offset="70%"  stop-color="#D4AF37" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="g1-bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#D4AF37" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>

    <filter id="f1-glow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="7"  flood-color="#D4AF37" flood-opacity="0.45"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#C4A47C" flood-opacity="0.20"/>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="560" height="200" fill="#050505"/>
  <rect width="560" height="200" fill="url(#g1-bg)"/>

  <!-- ── TOP-LEFT CIRCUIT CORNER ────────────────────────────── -->
  <polyline points="15,55 15,15 55,15"     fill="none" stroke="#D4AF37" stroke-opacity="0.6" stroke-width="1.5" stroke-linecap="square"/>
  <polyline points="24,46 24,24 46,24"     fill="none" stroke="#D4AF37" stroke-opacity="0.18" stroke-width="1"   stroke-linecap="square"/>
  <!-- Tick marks — top arm -->
  <line x1="30" y1="11" x2="30" y2="19"   stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <line x1="40" y1="11" x2="40" y2="19"   stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <line x1="50" y1="11" x2="50" y2="19"   stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <!-- Tick marks — left arm -->
  <line x1="11" y1="30" x2="19" y2="30"   stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <line x1="11" y1="40" x2="19" y2="40"   stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <line x1="11" y1="50" x2="19" y2="50"   stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <!-- Anchor circle + pad dots -->
  <circle cx="15" cy="15" r="3.5" fill="none" stroke="#D4AF37" stroke-opacity="0.8" stroke-width="1.5"/>
  <circle cx="15" cy="15" r="1.5" fill="#D4AF37" fill-opacity="0.65"/>
  <circle cx="55" cy="15" r="2.5" fill="#D4AF37" fill-opacity="0.7"/>
  <circle cx="15" cy="55" r="2.5" fill="#D4AF37" fill-opacity="0.7"/>
  <!-- Inner corner dot -->
  <circle cx="24" cy="24" r="1.5" fill="#D4AF37" fill-opacity="0.3"/>

  <!-- ── TOP-RIGHT CIRCUIT CORNER ───────────────────────────── -->
  <polyline points="545,55 545,15 505,15"  fill="none" stroke="#D4AF37" stroke-opacity="0.6" stroke-width="1.5" stroke-linecap="square"/>
  <polyline points="536,46 536,24 514,24"  fill="none" stroke="#D4AF37" stroke-opacity="0.18" stroke-width="1"   stroke-linecap="square"/>
  <line x1="510" y1="11" x2="510" y2="19" stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <line x1="520" y1="11" x2="520" y2="19" stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <line x1="530" y1="11" x2="530" y2="19" stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <line x1="541" y1="30" x2="549" y2="30" stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <line x1="541" y1="40" x2="549" y2="40" stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <line x1="541" y1="50" x2="549" y2="50" stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <circle cx="545" cy="15" r="3.5" fill="none" stroke="#D4AF37" stroke-opacity="0.8" stroke-width="1.5"/>
  <circle cx="545" cy="15" r="1.5" fill="#D4AF37" fill-opacity="0.65"/>
  <circle cx="505" cy="15" r="2.5" fill="#D4AF37" fill-opacity="0.7"/>
  <circle cx="545" cy="55" r="2.5" fill="#D4AF37" fill-opacity="0.7"/>
  <circle cx="536" cy="24" r="1.5" fill="#D4AF37" fill-opacity="0.3"/>

  <!-- ── BOTTOM-LEFT CIRCUIT CORNER ─────────────────────────── -->
  <polyline points="15,145 15,185 55,185"  fill="none" stroke="#D4AF37" stroke-opacity="0.6" stroke-width="1.5" stroke-linecap="square"/>
  <polyline points="24,154 24,176 46,176"  fill="none" stroke="#D4AF37" stroke-opacity="0.18" stroke-width="1"   stroke-linecap="square"/>
  <line x1="30" y1="181" x2="30" y2="189" stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <line x1="40" y1="181" x2="40" y2="189" stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <line x1="50" y1="181" x2="50" y2="189" stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <line x1="11" y1="150" x2="19" y2="150" stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <line x1="11" y1="160" x2="19" y2="160" stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <line x1="11" y1="170" x2="19" y2="170" stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <circle cx="15" cy="185" r="3.5" fill="none" stroke="#D4AF37" stroke-opacity="0.8" stroke-width="1.5"/>
  <circle cx="15" cy="185" r="1.5" fill="#D4AF37" fill-opacity="0.65"/>
  <circle cx="55" cy="185" r="2.5" fill="#D4AF37" fill-opacity="0.7"/>
  <circle cx="15" cy="145" r="2.5" fill="#D4AF37" fill-opacity="0.7"/>
  <circle cx="24" cy="176" r="1.5" fill="#D4AF37" fill-opacity="0.3"/>

  <!-- ── BOTTOM-RIGHT CIRCUIT CORNER ────────────────────────── -->
  <polyline points="545,145 545,185 505,185" fill="none" stroke="#D4AF37" stroke-opacity="0.6" stroke-width="1.5" stroke-linecap="square"/>
  <polyline points="536,154 536,176 514,176" fill="none" stroke="#D4AF37" stroke-opacity="0.18" stroke-width="1"   stroke-linecap="square"/>
  <line x1="510" y1="181" x2="510" y2="189" stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <line x1="520" y1="181" x2="520" y2="189" stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <line x1="530" y1="181" x2="530" y2="189" stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <line x1="541" y1="150" x2="549" y2="150" stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <line x1="541" y1="160" x2="549" y2="160" stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <line x1="541" y1="170" x2="549" y2="170" stroke="#D4AF37" stroke-opacity="0.45" stroke-width="1"/>
  <circle cx="545" cy="185" r="3.5" fill="none" stroke="#D4AF37" stroke-opacity="0.8" stroke-width="1.5"/>
  <circle cx="545" cy="185" r="1.5" fill="#D4AF37" fill-opacity="0.65"/>
  <circle cx="505" cy="185" r="2.5" fill="#D4AF37" fill-opacity="0.7"/>
  <circle cx="545" cy="145" r="2.5" fill="#D4AF37" fill-opacity="0.7"/>
  <circle cx="536" cy="176" r="1.5" fill="#D4AF37" fill-opacity="0.3"/>

  <!-- ── MAIN WORDMARK ──────────────────────────────────────── -->
  <text x="280" y="117"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="90" font-weight="800"
        text-anchor="middle"
        fill="url(#g1-gold)"
        filter="url(#f1-glow)"
        letter-spacing="-3">MR.C</text>

  <!-- Separator — widened to frame larger subtitle -->
  <line x1="130" y1="136" x2="430" y2="136" stroke="url(#g1-fade)" stroke-width="0.8"/>
  <!-- Centre diamond on separator -->
  <polygon points="280,131 283.5,136 280,141 276.5,136" fill="#D4AF37" fill-opacity="0.6"/>

  <!-- Subtitle — same metallic gradient as the wordmark, no blur -->
  <text x="280" y="165"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="22" font-weight="700"
        text-anchor="middle"
        fill="url(#g1-gold)"
        letter-spacing="4">DIGITAL STUDIO</text>
</svg>
